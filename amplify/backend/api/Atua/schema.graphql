type CompanyVehicle @model @auth(rules: [{ allow: public }]) {
  id: ID!
  vehicleType: String
  model: String
  plateNumber: String
  couriercompanyID: ID! @index(name: "byCourierCompany")
}

type CourierCompany @model @auth(rules: [{ allow: public }]) {
  id: ID!
  sub: String!
  firstName: String!
  lastName: String
  profilePic: String
  address: String
  lat: Float
  lng: Float
  landmark: String
  phoneNumber: String
  email: String
  adminFirstName: String
  adminLastName: String
  adminPhoneNumber: String
  bankName: String
  CompanyVehicles: [CompanyVehicle]
    @hasMany(indexName: "byCourierCompany", fields: ["id"])
  accountNumber: String
  push_token: String
}

# ---------------- ENUMS ----------------
enum FundsStatus {
  HELD
  RELEASED
}

enum OrderPayoutStatus {
  NOT_PAID
  PAID
}

enum OrderPaymentStatus {
  PENDING
  PAID
}

enum PaymentStatus {
  PENDING
  SUCCESS
  FAILED
}

enum TransactionType {
  CREDIT
  DEBIT
}

enum TransactionStatus {
  PENDING
  COMPLETED
  FAILED
}

enum PayoutStatus {
  PENDING
  PROCESSING
  PAID
  FAILED
}

enum OwnerType {
  COURIER
  USER
}

enum OfferStatus {
  ACTIVE
  ACCEPTED
  REJECTED
}

enum CourierPreTransferUploadStatus {
  PENDING
  UPLOADING
  COMPLETE
  FAILED
}

enum CourierPostLoadingUploadStatus {
  PENDING
  UPLOADING
  COMPLETE
  FAILED
}

enum DropoffUploadStatus {
  PENDING
  UPLOADING
  COMPLETE
  FAILED
}

enum MediaUploadStatus {
  PENDING
  UPLOADING
  COMPLETE
  FAILED
}

enum OrderStatus {
  BIDDING
  READY_FOR_PICKUP
  ACCEPTED
  ARRIVED_PICKUP
  LOADING
  PICKED_UP
  IN_TRANSIT
  ARRIVED_DROPOFF
  UNLOADING
  DELIVERED
  HANDOVER_TO_LOGISTICS
  IN_LOGISTICS_TRANSIT
  CANCELLED
  DISPUTED
}

# ---------------- MODELS ----------------
type Payout @model @auth(rules: [{ allow: public }]) {
  id: ID!

  courierID: ID! @index(name: "byCourier")

  amount: Float!

  status: PayoutStatus # PENDING | PROCESSING | PAID | FAILED
  bankName: String
  accountNumber: String

  reference: String
  walletID: ID @index(name: "byWallet")
}

type Transaction @model @auth(rules: [{ allow: public }]) {
  id: ID!

  walletID: ID! @index(name: "byWallet")

  type: TransactionType
  # CREDIT | DEBIT
  amount: Float!

  description: String

  orderID: ID @index(name: "byOrder")
  paymentID: ID @index(name: "byPayment")

  status: TransactionStatus # PENDING | COMPLETED
}

type Wallet @model @auth(rules: [{ allow: public }]) {
  id: ID!

  ownerID: ID!
  ownerType: OwnerType!

  balance: Float
  pendingBalance: Float
  totalEarnings: Float

  transactions: [Transaction] @hasMany(indexName: "byWallet", fields: ["id"])
}

type Payment @model @auth(rules: [{ allow: public }]) {
  id: ID!
  orderID: ID! @index(name: "byOrder")
  userID: ID! @index(name: "byUser")

  amount: Float!
  currency: String

  status: PaymentStatus # PENDING | SUCCESS | FAILED
  paymentMethod: String # CARD | TRANSFER | WALLET
  provider: String # PAYSTACK, FLUTTERWAVE
  reference: String # payment gateway ref
  order: Order @belongsTo(fields: ["orderID"])
  user: User @belongsTo(fields: ["userID"])
}

type Offer @model @auth(rules: [{ allow: public }]) {
  id: ID!

  orderID: ID @index(name: "byOrder")
  order: Order @belongsTo(fields: ["orderID"])

  courierID: ID @index(name: "byCourier")
  courier: Courier @belongsTo(fields: ["courierID"])

  senderType: String # "USER" | "COURIER"
  amount: Float
  status: OfferStatus # ACTIVE | ACCEPTED | REJECTED
}

type Order @model @auth(rules: [{ allow: public }]) {
  id: ID!

  # ---------------- BASIC INFO ----------------
  recipientName: String
  recipientNumber: String
  recipientNumber2: String
  orderDetails: String

  originAddress: String
  originState: String
  originLat: Float
  originLng: Float

  destinationAddress: String
  destinationState: String
  destinationLat: Float
  destinationLng: Float

  tripType: String
  distance: String

  transportationType: String
  vehicleClass: String
  status: OrderStatus

  # ------- FOR MAXI -------
  hasNewOffer: Boolean
  lastOfferAt: AWSDateTime
  lastOfferSenderType: String

  # ---------------- PRICING ----------------
  # ------- FOR MAXI -------
  loadCategory: String
  isInterState: Boolean
  estimatedMinPrice: Float
  estimatedMaxPrice: Float

  initialOfferPrice: Float # first price user sends
  loadingFee: Float
  unloadingFee: Float
  floorSurcharge: Float
  fragileSurcharge: Float

  extrasTotal: Float

  # ------- General -------
  totalPrice: Float # final agreed price
  operationalFare: Float # combination of distance and transportationType etc
  courierEarnings: Float
  commissionAmount: Float
  platformFee: Float
  platformServiceRevenue: Float # commissionAmount + platformFee
  vatAmount: Float
  platformNetRevenue: Float # platformServiceRevenue - vatAmount
  # ---------------- VERIFICATION ----------------
  deliveryVerificationCode: String

  # ---------------- WEIGHT ----------------
  declaredWeightBracket: String

  # Interstate (Courier + Logistics Company Flow)

  # ---------------- CUSTODY EVIDENCE ----------------
  senderPreTransferPhotos: [String]
  senderPreTransferVideo: String
  senderPreTransferRecordedAt: AWSDateTime

  senderPreTransferLocalPhotos: [String]
  senderPreTransferLocalVideo: String

  # ---------------- USER MEDIA UPLOAD STATUS ----------------
  mediaUploadStatus: MediaUploadStatus

  # ---------------- COURIER MEDIA UPLOAD STATUS ----------------
  courierPreTransferUploadStatus: CourierPreTransferUploadStatus
  courierPostLoadingUploadStatus: CourierPostLoadingUploadStatus
  dropoffUploadStatus: DropoffUploadStatus

  courierPreTransferPhotos: [String]
  courierPreTransferVideo: String
  courierPreTransferRecordedAt: AWSDateTime

  courierPreTransferLocalPhotos: [String]
  courierPreTransferLocalVideo: String

  courierPostLoadingPhotos: [String]
  courierPostLoadingVideo: String

  courierPostLoadingLocalPhotos: [String]
  courierPostLoadingLocalVideo: String

  dropoffArrivalPhotos: [String]
  dropoffArrivalVideo: String

  dropoffArrivalLocalPhotos: [String]
  dropoffArrivalLocalVideo: String

  postDeliveryPhotos: [String]
  postDeliveryVideo: String

  # ---------------- LOADING DETAILS ----------------
  pickupLoadingResponsibility: String
  pickupFloorLevel: String
  pickupFloorLevelPrice: Float
  pickupHasElevator: Boolean

  dropoffUnloadingResponsibility: String
  dropoffFloorLevel: String
  dropoffFloorLevelPrice: Float
  dropoffHasElevator: Boolean

  # ---------------- TIME EVENTS ----------------
  acceptedAt: AWSDateTime
  arrivedPickupAt: AWSDateTime
  loadingStartedAt: AWSDateTime
  tripStartedAt: AWSDateTime
  arrivedDropoffAt: AWSDateTime
  unloadingCompletedAt: AWSDateTime

  # ---------------- LOGISTICS COMPANY (INTERSTATE) ----------------
  logisticsCompanyId: ID
  waybillNumber: String
  waybillPhoto: String
  logisticsTrackingCode: String
  logisticsTrackingStatus: String
  handedOverToLogisticsAt: AWSDateTime
  logisticsIntakeConfirmedAt: AWSDateTime

  # ---------------- OFFER ID THAT WAS ACCEPTED ----------------
  acceptedOfferID: ID

  # ---------------- PAYMENT FIELDS ----------------
  paymentStatus: OrderPaymentStatus # PENDING | PAID
  paymentID: ID

  payoutStatus: OrderPayoutStatus # NOT_PAID | PAID
  fundsStatus: FundsStatus # HELD | RELEASED
  # ---------------- ASSIGNMENT FIELDS ----------------
  assignedCourierId: ID @index(name: "byAssignedCourier")
  #assignmentStatus: String
  assignmentExpiresAt: AWSDateTime
  assignmentAttempts: Int
  lastAssignedAt: AWSDateTime
  rejectedCourierIds: [ID] # meant to be for couriers already assigned that expired or didn't accept
  # ---------------- RELATIONS ----------------
  assignmentStatus: String
    @index(name: "byAssignmentStatus", sortKeyFields: ["assignmentExpiresAt"])
  userID: ID! @index(name: "byUser")
  offers: [Offer] @hasMany(indexName: "byOrder", fields: ["id"])
  assignedCourier: Courier @belongsTo(fields: ["assignedCourierId"])
  payments: [Payment] @hasMany(indexName: "byOrder", fields: ["id"])
}

type Courier @model @auth(rules: [{ allow: public }]) {
  id: ID!
  sub: String!
  isOnline: Boolean
  firstName: String!
  lastName: String
  profilePic: String
  address: String
  landMark: String
  phoneNumber: String
  email: String
  courierNIN: String
  courierNINImage: String
  bankCode: String
  bankName: String
  accountName: String
  accountNumber: String
  transportationType: String
  vehicleClass: String
  model: String
  vehicleColour: String
  plateNumber: String
  maxiImages: [String]
  maxiDescription: String
  guarantorName: String
  guarantorLastName: String
  guarantorProfession: String
  guarantorNumber: String
  guarantorRelationship: String
  guarantorAddress: String
  guarantorEmail: String
  guarantorNIN: String
  guarantorNINImage: String
  lat: Float
  lng: Float
  heading: Float
  push_token: String
  isApproved: Boolean
  approvedById: String
  currentBatchCount: Int
  currentExpressCount: Int
  currentMaxiCount: Int
  lastBatchAssignedAt: AWSDateTime

  statusKey: String @index(name: "byStatus", queryField: "couriersByStatus")
  offers: [Offer] @hasMany(indexName: "byCourier", fields: ["id"])
  orders: [Order] @hasMany(indexName: "byAssignedCourier", fields: ["id"])
  walletID: ID
  wallet: Wallet @hasOne(fields: ["walletID"])
}

type User @model @auth(rules: [{ allow: public }]) {
  id: ID!
  sub: String!
  firstName: String!
  lastName: String
  email: String
  phoneNumber: String
  profilePic: String
  address: String
  exactAddress: String
  lat: Float
  lng: Float
  isBlocked: Boolean
  push_token: String
  Orders: [Order] @hasMany(indexName: "byUser", fields: ["id"])
  payments: [Payment] @hasMany(indexName: "byUser", fields: ["id"])
}

# ---------------- WALLET AND PAYMENT STRUCTURE ----------------
# Courier - has one wallet
# Wallet - belongs to courier - has many transactions
# Transaction - belongs to wallet
# Payment - belongs to order + user
# Order - has many payments
