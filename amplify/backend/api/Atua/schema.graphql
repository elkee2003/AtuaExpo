type CompanyVehicle @model @auth(rules: [{ allow: public }]) {
  id: ID!
  vehicleType: String
  model: String
  plateNumber: String
  couriercompanyID: ID! @index(name: "byCourierCompany")
}

type CourierCompany @model @auth(rules: [{ allow: public }]) {
  id: ID!
  sub: String!
  firstName: String!
  lastName: String
  profilePic: String
  address: String
  lat: Float
  lng: Float
  landmark: String
  phoneNumber: String
  email: String
  adminFirstName: String
  adminLastName: String
  adminPhoneNumber: String
  bankName: String
  CompanyVehicles: [CompanyVehicle]
    @hasMany(indexName: "byCourierCompany", fields: ["id"])
  accountNumber: String
  push_token: String
}

enum OfferStatus {
  ACTIVE
  ACCEPTED
  REJECTED
}

enum MediaUploadStatus {
  PENDING
  UPLOADING
  COMPLETE
  FAILED
}

enum OrderStatus {
  BIDDING
  READY_FOR_PICKUP
  ACCEPTED
  ARRIVED_PICKUP
  LOADING
  PICKED_UP
  IN_TRANSIT
  ARRIVED_DROPOFF
  UNLOADING
  DELIVERED
  HANDOVER_TO_LOGISTICS
  IN_LOGISTICS_TRANSIT
  CANCELLED
  DISPUTED
}

type Offer @model @auth(rules: [{ allow: public }]) {
  id: ID!

  orderID: ID @index(name: "byOrder")
  order: Order @belongsTo(fields: ["orderID"])

  courierID: ID @index(name: "byCourier")
  courier: Courier @belongsTo(fields: ["courierID"])

  senderType: String # "USER" | "COURIER"
  amount: Float
  status: OfferStatus # ACTIVE | ACCEPTED | REJECTED
}

type Order @model @auth(rules: [{ allow: public }]) {
  id: ID!

  # ---------------- BASIC INFO ----------------
  recipientName: String
  recipientNumber: String
  recipientNumber2: String
  orderDetails: String

  originAddress: String
  originState: String
  originLat: Float
  originLng: Float

  destinationAddress: String
  destinationState: String
  destinationLat: Float
  destinationLng: Float

  tripType: String
  distance: String

  transportationType: String
  vehicleClass: String
  status: OrderStatus

  # ---------------- PRICING ----------------
  # ------- FOR MAXI -------
  loadCategory: String
  isInterState: Boolean
  estimatedMinPrice: Float
  estimatedMaxPrice: Float

  initialOfferPrice: Float # first price user sends
  currentOfferPrice: Float # latest active offer
  lastOfferBy: String # "USER" or "COURIER"
  loadingFee: Float
  unloadingFee: Float

  # ------- General -------
  totalPrice: Float # final agreed price
  courierEarnings: Float
  commissionAmount: Float
  platformFee: Float
  platformServiceRevenue: Float # commissionAmount + platformFee
  vatAmount: Float
  platformNetRevenue: Float # platformServiceRevenue - vatAmount
  # ---------------- VERIFICATION ----------------
  deliveryVerificationCode: String

  # ---------------- WEIGHT ----------------
  declaredWeightBracket: String

  # Interstate (Courier + Logistics Company Flow)

  # ---------------- CUSTODY EVIDENCE ----------------
  senderPreTransferPhotos: [String]
  senderPreTransferVideo: String
  senderPreTransferRecordedAt: AWSDateTime

  senderPreTransferLocalPhotos: [String]
  senderPreTransferLocalVideo: String

  # ---------------- MEDIA UPLOAD STATUS ----------------
  mediaUploadStatus: MediaUploadStatus

  courierPreTransferPhotos: [String]
  courierPreTransferVideo: String
  courierPreTransferRecordedAt: AWSDateTime

  courierPostLoadingPhotos: [String]
  courierPostLoadingVideo: String

  dropoffArrivalPhotos: [String]
  dropoffArrivalVideo: String

  postDeliveryPhotos: [String]
  postDeliveryVideo: String

  # ---------------- LOADING DETAILS ----------------
  pickupLoadingResponsibility: String
  pickupFloorLevel: String
  pickupFloorLevelPrice: Float
  pickupHasElevator: Boolean

  dropoffUnloadingResponsibility: String
  dropoffFloorLevel: String
  dropoffFloorLevelPrice: Float
  dropoffHasElevator: Boolean

  # ---------------- TIME EVENTS ----------------
  acceptedAt: AWSDateTime
  arrivedPickupAt: AWSDateTime
  loadingStartedAt: AWSDateTime
  tripStartedAt: AWSDateTime
  arrivedDropoffAt: AWSDateTime
  unloadingCompletedAt: AWSDateTime

  # ---------------- LOGISTICS COMPANY (INTERSTATE) ----------------
  logisticsCompanyId: ID
  waybillNumber: String
  waybillPhoto: String
  logisticsTrackingCode: String
  logisticsTrackingStatus: String
  handedOverToLogisticsAt: AWSDateTime
  logisticsIntakeConfirmedAt: AWSDateTime

  # ---------------- OFFER ID THAT WAS ACCEPTED ----------------
  acceptedOfferID: ID

  # ---------------- ASSIGNMENT FIELDS ----------------
  assignedCourierId: ID @index(name: "byAssignedCourier")
  assignmentStatus: String
  assignmentExpiresAt: AWSDateTime
  assignmentAttempts: Int
  lastAssignedAt: AWSDateTime
  rejectedCourierIds: [ID] # meant to be for couriers already assigned that expired or didn't accept
  # ---------------- RELATIONS ----------------
  userID: ID! @index(name: "byUser")
  offers: [Offer] @hasMany(indexName: "byOrder", fields: ["id"])
  assignedCourier: Courier @belongsTo(fields: ["assignedCourierId"])
}

type Courier @model @auth(rules: [{ allow: public }]) {
  id: ID!
  sub: String!
  isOnline: Boolean
  firstName: String!
  lastName: String
  profilePic: String
  address: String
  landMark: String
  phoneNumber: String
  email: String
  courierNIN: String
  courierNINImage: String
  bankCode: String
  bankName: String
  accountName: String
  accountNumber: String
  transportationType: String
  vehicleClass: String
  model: String
  vehicleColour: String
  plateNumber: String
  maxiImages: [String]
  maxiDescription: String
  guarantorName: String
  guarantorLastName: String
  guarantorProfession: String
  guarantorNumber: String
  guarantorRelationship: String
  guarantorAddress: String
  guarantorEmail: String
  guarantorNIN: String
  guarantorNINImage: String
  lat: Float
  lng: Float
  heading: Float
  push_token: String
  isApproved: Boolean
  approvedById: String
  currentBatchCount: Int
  currentExpressCount: Int
  lastBatchAssignedAt: AWSDateTime

  offers: [Offer] @hasMany(indexName: "byCourier", fields: ["id"])
  orders: [Order] @hasMany(indexName: "byAssignedCourier", fields: ["id"])
}

type User @model @auth(rules: [{ allow: public }]) {
  id: ID!
  sub: String!
  firstName: String!
  lastName: String
  email: String
  phoneNumber: String
  profilePic: String
  address: String
  exactAddress: String
  lat: Float
  lng: Float
  push_token: String
  Orders: [Order] @hasMany(indexName: "byUser", fields: ["id"])
}
